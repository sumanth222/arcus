spring.application.name=arc1
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:6543/postgres?prepareThreshold=0}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.bdoaznoajsllanqvejbo}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:changeme}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# HikariCP - Transaction mode pooler supports many clients, keep pool small
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Google OAuth2
google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}

# OpenAI / ChatGPT
openai.api.key=${OPENAI_API_KEY:your-openai-api-key}
openai.api.model=gpt-4o-mini
